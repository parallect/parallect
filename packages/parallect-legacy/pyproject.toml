[project]
name = "parallect"
version = "0.3.0"
description = "Compatibility shim for the 'parallect' PyPI name. The canonical distribution is now 'parallect-cli'."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "parallect-cli==0.3.0",
]
authors = [
    { name = "Julian Reese" },
]
keywords = ["parallect", "deep-research", "llm", "cli", "deprecation-shim"]
classifiers = [
    "Development Status :: 7 - Inactive",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

[project.urls]
Homepage = "https://github.com/parallect/parallect"
Canonical = "https://pypi.org/project/parallect-cli/"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/parallect_deprecation"]

[tool.hatch.build.targets.sdist]
include = ["src/parallect_deprecation", "README.md", "pyproject.toml"]
